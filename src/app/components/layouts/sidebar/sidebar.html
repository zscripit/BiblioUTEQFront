<!-- Telón de fondo -->
<div
  class="telon"
  [class.telon--visible]="abierto()"
  (click)="cerrar.emit()"
  aria-hidden="true"
></div>

<!-- Menú lateral deslizante -->
<aside
  class="sidebar"
  [class.sidebar--abierta]="abierto()"
  aria-label="Menú del panel"
>
  <header class="sidebar__cabecera">
    <div class="sidebar__marca">
      <span aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          <path d="M9 7h6M9 11h4" />
        </svg>
      </span>
      <strong>Biblioteca UTEQ</strong>
    </div>
    <button
      type="button"
      class="sidebar__cerrar"
      (click)="cerrar.emit()"
      aria-label="Cerrar el menú"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 6L6 18M6 6l12 12" />
      </svg>
    </button>
  </header>

  <!-- Usuario -->
  <div class="sidebar__usuario">
    <span class="sidebar__avatar" aria-hidden="true">{{ iniciales() }}</span>
    <div class="sidebar__datos">
      <strong>{{ usuario()?.nombre ?? 'Invitado' }}</strong>
      <small>{{ usuario()?.correo ?? '' }}</small>
    </div>
  </div>

  <span class="sidebar__titulo">Menú</span>

  <nav class="sidebar__navegacion">
    <ul class="sidebar__lista">
      <li>
        <a routerLink="/" routerLinkActive="sidebar__enlace--activo" [routerLinkActiveOptions]="{ exact: true }" class="sidebar__enlace" (click)="cerrar.emit()">
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12L12 3l9 9" />
              <path d="M9 21V9h6v12" />
            </svg>
          </span>
          <span>Inicio</span>
        </a>
      </li>
      <li>
        <a routerLink="/sobre-nosotros" routerLinkActive="sidebar__enlace--activo" class="sidebar__enlace" (click)="cerrar.emit()">
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="3" />
              <path d="M5.5 20a7 7 0 0 1 13 0" />
            </svg>
          </span>
          <span>Sobre nosotros</span>
        </a>
      </li>
      <li>
        <a routerLink="/contactos" routerLinkActive="sidebar__enlace--activo" class="sidebar__enlace" (click)="cerrar.emit()">
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 8V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v1" />
              <path d="M7 10h10" />
              <path d="M7 14h10" />
              <path d="M7 18h6" />
            </svg>
          </span>
          <span>Contactos</span>
        </a>
      </li>
      <li>
        <a routerLink="/politicas" routerLinkActive="sidebar__enlace--activo" class="sidebar__enlace" (click)="cerrar.emit()">
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2l7 4.5v11L12 22 5 17.5v-11L12 2z" />
              <path d="M12 22V6" />
            </svg>
          </span>
          <span>Políticas</span>
        </a>
      </li>
      <li>
        <a routerLink="/catalogo" routerLinkActive="sidebar__enlace--activo" class="sidebar__enlace" (click)="cerrar.emit()">
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
              <path d="M9 7h6M9 11h4" />
            </svg>
          </span>
          <span>Catálogo</span>
        </a>
      </li>
      <li>
        <a routerLink="/home" routerLinkActive="sidebar__enlace--activo" class="sidebar__enlace" (click)="cerrar.emit()">
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12L12 3l9 9" />
              <path d="M9 21V9h6v12" />
            </svg>
          </span>
          <span>Préstamos de libro</span>
        </a>
      </li>
      <li>
        <a routerLink="/mis-reservas" routerLinkActive="sidebar__enlace--activo" class="sidebar__enlace" (click)="cerrar.emit()">
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
            </svg>
          </span>
          <span>Mis reservas</span>
        </a>
      </li>
      <li>
        <a routerLink="/admin/libros" routerLinkActive="sidebar__enlace--activo" class="sidebar__enlace" (click)="cerrar.emit()">
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
              <path d="M9 7h6M9 11h4" />
            </svg>
          </span>
          <span>Administrar libros</span>
        </a>
      </li>
    </ul>

    <span class="sidebar__titulo">Personal</span>
    <ul class="sidebar__lista">
      <li>
        <a routerLink="/bibliotecario" class="sidebar__enlace" (click)="cerrar.emit()">
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          </span>
          <span>Panel de bibliotecario</span>
        </a>
      </li>
    </ul>
  </nav>

  <footer class="sidebar__pie">
    <button type="button" class="sidebar__salir" (click)="cerrarSesion()">
      <span class="sidebar__icono sidebar__icono--rojo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <path d="M16 17l5-5-5-5" />
          <path d="M21 12H9" />
        </svg>
      </span>
      <span>Cerrar sesión</span>
    </button>
  </footer>
</aside>
