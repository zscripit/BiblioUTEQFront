<div
  class="telon"
  [class.telon--visible]="abierto()"
  (click)="cerrar.emit()"
  aria-hidden="true"
></div>

<aside class="sidebar" [class.sidebar--abierta]="abierto()" aria-label="Menú del panel de préstamos">
  <header class="sidebar__cabecera">
    <div class="sidebar__marca">
      <span aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          <path d="M9 7h6M9 11h4" />
        </svg>
      </span>
      <strong>Biblioteca UTEQ</strong>
    </div>
    <button type="button" class="sidebar__cerrar" (click)="cerrar.emit()" aria-label="Cerrar el menú">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 6L6 18M6 6l12 12" />
      </svg>
    </button>
  </header>

  <div class="sidebar__usuario">
    <span class="sidebar__avatar" aria-hidden="true">{{ iniciales() }}</span>
    <div class="sidebar__datos">
      <strong>{{ usuario()?.nombre ?? 'Bibliotecario' }}</strong>
      <small>{{ usuario()?.correo ?? '' }}</small>
    </div>
  </div>

  <span class="sidebar__titulo">Préstamos</span>

  <nav class="sidebar__navegacion">
    <ul class="sidebar__lista">
      <li>
        <a
          routerLink="/bibliotecario/prestamos/registrar"
          routerLinkActive="sidebar__enlace--activo"
          class="sidebar__enlace"
          (click)="cerrar.emit()"
        >
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14" />
            </svg>
          </span>
          <span>Registrar préstamo</span>
        </a>
      </li>
      <li>
        <a
          routerLink="/bibliotecario/prestamos/activos"
          routerLinkActive="sidebar__enlace--activo"
          class="sidebar__enlace"
          (click)="cerrar.emit()"
        >
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </span>
          <span>Préstamos activos</span>
        </a>
      </li>
      <li>
        <a
          routerLink="/bibliotecario/prestamos/historial"
          routerLinkActive="sidebar__enlace--activo"
          class="sidebar__enlace"
          (click)="cerrar.emit()"
        >
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <path d="M12 6v6l4 2" />
            </svg>
          </span>
          <span>Historial de préstamos</span>
        </a>
      </li>
    </ul>

    <span class="sidebar__titulo">Devoluciones</span>
    <ul class="sidebar__lista">
      <li>
        <a
          routerLink="/bibliotecario/devoluciones/registrar"
          routerLinkActive="sidebar__enlace--activo"
          class="sidebar__enlace"
          (click)="cerrar.emit()"
        >
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6L9 17l-5-5" />
            </svg>
          </span>
          <span>Registrar devolución</span>
        </a>
      </li>
      <li>
        <a
          routerLink="/bibliotecario/devoluciones/historial"
          routerLinkActive="sidebar__enlace--activo"
          class="sidebar__enlace"
          (click)="cerrar.emit()"
        >
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <path d="M12 6v6l4 2" />
            </svg>
          </span>
          <span>Historial de devoluciones</span>
        </a>
      </li>
      <li>
        <a
          routerLink="/bibliotecario/devoluciones/sanciones"
          routerLinkActive="sidebar__enlace--activo"
          class="sidebar__enlace"
          (click)="cerrar.emit()"
        >
          <span class="sidebar__icono" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <path d="M12 8v4M12 16h.01" />
            </svg>
          </span>
          <span>Administrar sanciones</span>
        </a>
      </li>
    </ul>
  </nav>

  <footer class="sidebar__pie">
    <button type="button" class="sidebar__salir" (click)="cerrarSesion()">
      <span class="sidebar__icono sidebar__icono--rojo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <path d="M16 17l5-5-5-5" />
          <path d="M21 12H9" />
        </svg>
      </span>
      <span>Cerrar sesión</span>
    </button>
  </footer>
</aside>
